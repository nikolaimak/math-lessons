<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natasha's Subtraction Magic ✨🦄</title>
  <meta name="description" content="A magical way to learn 2-digit subtraction with tens and ones." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky">
    <div class="rainbow"></div>
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="clouds" aria-hidden="true">
      <span class="cloud c1"></span>
      <span class="cloud c2"></span>
      <span class="cloud c3"></span>
    </div>
  </div>

  <main class="app">
    <!-- ============ START SCREEN ============ -->
    <section id="screen-start" class="screen card">
      <div class="unicorn-big" aria-hidden="true">
        <!-- unicorn SVG injected by JS -->
      </div>
      <h1 class="title">Subtraction Magic</h1>
      <p class="subtitle">Hi <span class="name">Natasha</span>! Ready to become a
        <strong>Subtraction Unicorn</strong>? 🦄</p>
      <p class="lead">We'll take away numbers using <b>Tens</b> and <b>Ones</b> —
        just like in your drawing!</p>

      <div class="level-pick">
        <button class="lvl-btn" data-mode="gentle">
          <span class="lvl-emoji">🌈</span>
          <span class="lvl-name">Start Gentle</span>
          <span class="lvl-desc">Easy ones first, then exchanging</span>
        </button>
        <button class="lvl-btn" data-mode="exchange">
          <span class="lvl-emoji">✨</span>
          <span class="lvl-name">Exchange Power</span>
          <span class="lvl-desc">Every problem needs an exchange</span>
        </button>
        <button class="lvl-btn" data-mode="mixed">
          <span class="lvl-emoji">🦄</span>
          <span class="lvl-name">Surprise Mix</span>
          <span class="lvl-desc">A magical mixture!</span>
        </button>
      </div>

      <label class="sound-toggle">
        <input type="checkbox" id="speak-toggle" checked />
        <span>🔊 Read the steps out loud</span>
      </label>
    </section>

    <!-- ============ GAME SCREEN ============ -->
    <section id="screen-game" class="screen hidden">
      <header class="game-top">
        <button class="icon-btn" id="home-btn" title="Back home">🏠</button>
        <div class="progress-wrap" title="Stars collected">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="star-count">⭐ <span id="star-count">0</span></div>
        </div>
        <button class="icon-btn" id="speak-btn" title="Read aloud on/off">🔊</button>
      </header>

      <div class="problem-banner">
        <span id="big-top">85</span>
        <span class="minus">−</span>
        <span id="big-bot">79</span>
        <span class="eq">=</span>
        <span id="big-ans" class="qmark">?</span>
      </div>

      <!-- Unicorn helper + speech bubble -->
      <div class="helper">
        <div class="unicorn-small" aria-hidden="true"></div>
        <div class="bubble" id="bubble">Let's begin! ✨</div>
      </div>

      <div class="board-wrap">
        <!-- Place value chart -->
        <div class="chart" id="chart">
          <div class="chart-head">
            <div class="col-head tens-head">Tens</div>
            <div class="col-head ones-head">Ones</div>
          </div>
          <div class="chart-body">
            <div class="col tens-col" id="tens-col" aria-label="Tens column"></div>
            <div class="col ones-col" id="ones-col" aria-label="Ones column"></div>
          </div>
          <div class="chart-foot">
            <div class="foot-label">Answer</div>
            <div class="foot-answer">
              <span class="ans-tens" id="ans-tens">·</span>
              <span class="ans-ones" id="ans-ones">·</span>
            </div>
          </div>
        </div>

        <!-- Linked column / vertical form -->
        <div class="column-form" id="column-form" aria-hidden="true">
          <div class="cf-title">Number way</div>
          <table class="cf-table">
            <tr class="cf-borrow">
              <td></td>
              <td class="cf-cell" id="cf-bt"></td>
              <td class="cf-cell" id="cf-bo"></td>
            </tr>
            <tr class="cf-top">
              <td></td>
              <td class="cf-cell" id="cf-tt">8</td>
              <td class="cf-cell" id="cf-to">5</td>
            </tr>
            <tr class="cf-bot">
              <td class="cf-sign">−</td>
              <td class="cf-cell" id="cf-ot">7</td>
              <td class="cf-cell" id="cf-oo">9</td>
            </tr>
            <tr class="cf-result">
              <td></td>
              <td class="cf-cell" id="cf-rt"></td>
              <td class="cf-cell" id="cf-ro"></td>
            </tr>
          </table>
        </div>
      </div>

      <div class="controls">
        <button class="big-btn ghost" id="hint-btn">💡 Show me</button>
        <button class="big-btn primary hidden" id="next-btn">Next ➜</button>
      </div>
    </section>
  </main>

  <!-- Celebration layer -->
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
